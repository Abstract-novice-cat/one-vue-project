<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vue 3 + Vite application for 小猴待办" />
    <title>小猴待办</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #f3f4f6;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(64, 158, 255, 0.18), transparent 35%),
          linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      }

      #app {
        width: min(100%, 640px);
        min-height: 100vh;
        padding: 24px;
      }

      .app-shell {
        width: 100%;
        min-height: 100vh;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.18);
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
